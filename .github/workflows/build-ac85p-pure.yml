name: Build AC85P Padavan 3.4内核纯净版
# 触发方式：页面手动运行 / Star一键编译
on:
  workflow_dispatch:
  watch:
    types: [started]

env:
  TARGET_MODEL: RT-AC85P
  IMG_OUTPUT: trunk/images
  TOOLCHAIN_DIR: toolchain-mipsel

jobs:
  compile_k34:
    runs-on: ubuntu-latest
    steps:
      # 拉取wz5400/Padavan85完整源码
      - name: 检出仓库源码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 3.4内核专用编译依赖（去除4.4需要的multilib）
      - name: 安装3.4内核编译依赖
        run: |
          sudo apt update -qq
          sudo apt install -y autoconf automake autopoint bison build-essential flex gawk gettext gperf libtool pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev texinfo python3-docutils fakeroot kmod cpio xxd unzip libncurses5-dev git wget

      # 清理旧工具链与编译缓存
      - name: 全量清理缓存
        run: |
          cd trunk
          ./clean_all
          cd ../${{ env.TOOLCHAIN_DIR }}
          ./clean_sources

      # 编译3.4专用交叉工具链（核心区别！）
      - name: 编译3.4.x交叉工具链
        run: |
          cd ${{ env.TOOLCHAIN_DIR }}
          ./build_toolchain_3.4.x

      # 编译纯净RT-AC85P 3.4固件
      - name: 编译3.4内核纯净固件
        run: |
          cd trunk
          # clean-only 不打包第三方插件，极致纯净
          ./build_firmware ${{ env.TARGET_MODEL }} clean-only

      # 上传固件包
      - name: 打包上传固件
        uses: actions/upload-artifact@v4
        with:
          name: RT-AC85P-K34-纯净Padavan
          path: ${{ env.IMG_OUTPUT }}
          retention-days: 30
