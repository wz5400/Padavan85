name: Build Padavan RT-AC85P
# 触发方式：star点击/推送代码时编译
on:
  push:
    branches: [ main ]
  watch:
    types: [started]

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      # 编译机型，RT-AC85P 对应模板文件名
      TARGET_NAME: RT-AC85P
      # Padavan 源码仓库（稳定版推荐，避免snapshot文件结构变动）
      PADAVAN_GIT: https://github.com/wz5400/Padavan85.git
      WORK_DIR: Padavan85
    steps:
      # 1. 修复Node.js弃用警告，升级checkout到v5
      - name: 拉取编译脚本仓库
        uses: actions/checkout@v5

      # 2. 安装Padavan全套编译依赖
      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y autoconf automake autopoint bison build-essential flex gawk gettext git gperf libtool pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev texinfo python3-docutils unzip fakeroot

      # 3. 拉取Padavan完整源码（递归子模块，解决toolchain目录缺失）
      - name: 拉取Padavan源码
        run: |
          git clone --recursive ${{ env.PADAVAN_GIT }} ${{ env.WORK_DIR }}
          cd ${{ env.WORK_DIR }}
          ls -la toolchain-mipsel || echo "警告：toolchain-mipsel目录缺失，源码仓库不完整"

      # 4. 编译交叉工具链（修复clean_sources找不到的兼容逻辑）
      - name: 编译交叉工具链 mipsel
        run: |
          cd ${{ env.WORK_DIR }}/toolchain-mipsel
          # 兼容处理：找不到clean_sources则跳过清理，避免exit code 127
          if [ -f "./clean_sources" ];then
            chmod +x ./clean_sources
            ./clean_sources
          else
            echo "未检测到clean_sources脚本，跳过清理步骤"
          fi
          chmod +x ./build_toolchain
          ./build_toolchain

      # 5. 配置RT-AC85P机型固件
      - name: 加载机型配置
        run: |
          cd ${{ env.WORK_DIR }}/trunk
          cp configs/templates/${{ env.TARGET_NAME }}.config .config
          # 可在此处自定义插件开关，示例：开启科学插件
          # sed -i 's/CONFIG_FIRMWARE_INCLUDE_SSP=0/CONFIG_FIRMWARE_INCLUDE_SSP=1/' .config

      # 6. 编译固件
      - name: 编译Padavan固件
        run: |
          cd ${{ env.WORK_DIR }}/trunk
          ./clear_tree
          fakeroot ./build_firmware_modify ${{ env.TARGET_NAME }}

      # 7. 上传编译好的固件包
      - name: 上传固件Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Padavan-${{ env.TARGET_NAME }}-固件
          path: ${{ env.WORK_DIR }}/trunk/images/*.trx
          retention-days: 30
