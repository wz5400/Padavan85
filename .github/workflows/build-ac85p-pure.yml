name: Build Padavan RT-AC85P
# 触发条件：推送代码 / 点Star自动编译
on:
  push:
    branches: [ main ]
  watch:
    types: [started]

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      TARGET_NAME: RT-AC85P
      # 你指定的源码仓库
      PADAVAN_GIT: https://github.com/wz5400/Padavan85.git
      WORK_DIR: rt-n56u
    steps:
      # 1. 拉取仓库脚本，checkout v5 消除Node20警告
      - name: 拉取编译配置仓库
        uses: actions/checkout@v5

      # 2. 安装全套编译依赖（新增libtool，同时保留help2man等所有必需工具）
      - name: 安装编译依赖
        run: |
          sudo apt update -qq
          sudo apt install -qqy autoconf automake autopoint libtool bison build-essential flex gawk gettext git gperf pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev texinfo python3-docutils unzip fakeroot help2man

      # 3. 完整拉取Padavan源码+递归子模块，防止toolchain目录缺失
      - name: 拉取Padavan完整源码
        run: |
          git clone --recursive ${{ env.PADAVAN_GIT }} ${{ env.WORK_DIR }}
          cd ${{ env.WORK_DIR }}
          ls -la toolchain-mipsel

      # 4. 编译mipsel交叉工具链（兼容判断clean_sources，规避exit code 127）
      - name: 编译mipsel交叉工具链
        run: |
          cd ${{ env.WORK_DIR }}/toolchain-mipsel
          if [ -f "./clean_sources" ];then
            chmod +x ./clean_sources
            ./clean_sources
          else
            echo "未找到clean_sources脚本，跳过清理步骤"
          fi
          chmod +x ./build_toolchain
          ./build_toolchain

      # 5. 载入RT-AC85P机型配置模板
      - name: 加载机型配置
        run: |
          cd ${{ env.WORK_DIR }}/trunk
          cp configs/templates/${{ env.TARGET_NAME }}.config .config
          # 此处可自行添加sed命令开启/关闭插件，示例：
          # sed -i 's/CONFIG_FIRMWARE_INCLUDE_SSP=0/CONFIG_FIRMWARE_INCLUDE_SSP=1/' .config

      # 6. 编译固件
      - name: 编译Padavan固件
        run: |
          cd ${{ env.WORK_DIR }}/trunk
          ./clear_tree
          fakeroot ./build_firmware_modify ${{ env.TARGET_NAME }}

      # 7. 上传编译产出固件包
      - name: 上传固件至Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Padavan-${{ env.TARGET_NAME }}-固件
          path: ${{ env.WORK_DIR }}/trunk/images/*.trx
          retention-days: 30
