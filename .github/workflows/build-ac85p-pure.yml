name: Build AC85P Pure Padavan
# 触发方式：页面手动运行 / Star一键编译
on:
  workflow_dispatch:
  watch:
    types: [started]

env:
  TARGET: RT-AC85P
  IMG_PATH: trunk/images

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库完整源码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装4.4内核全套编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y autoconf automake bison build-essential flex gawk gettext gperf libtool pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev texinfo python3-docutils fakeroot kmod cpio xxd unzip libncurses5-dev gcc-multilib g++-multilib git

      - name: 清理全部编译缓存
        run: |
          cd trunk
          ./clean_all
          cd ../toolchain-mipsel
          ./clean_sources

      - name: 编译交叉工具链
        run: |
          cd toolchain-mipsel
          ./build_toolchain

      - name: 编译纯净RT-AC85P固件（不加载附加插件）
        run: |
          cd trunk
          ./build_firmware ${{ env.TARGET }} clean-only

      - name: 上传固件到Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RT-AC85P-纯净Padavan固件
          path: ${{ env.IMG_PATH }}
          retention-days: 30
